apply plugin: 'com.android.application'
apply plugin: 'com.chaquo.python'  // Add Chaquopy Python plugin

android {
    compileSdkVersion 33
    defaultConfig {
        applicationId "com.example.imguihelloworld"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DANDROID=ON"
            }
        }
        
        // Add Python support
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
        
        // Configure Python packages from requirements.txt
        python {
            version "3.11"  // Use Python 3.11
            
            // Tell Chaquopy to download and use its own Python distribution
            buildPython "chaquopy"
            
            pip {
                // Core dependencies for TickerMonitor
                install "pandas"
                install "numpy"
                install "requests"
                
                // Testing dependencies (not needed for runtime, but included for completeness)
                install "pytest"
                install "setuptools"
                install "pytest-mock"
                install "pytest-asyncio"
                
                // Mobile-specific dependencies
                install "pyjnius"
                install "plyer"
                
                // Additional dependencies that might be needed
                install "python-dateutil"
                install "pytz"
                install "six==1.16.0"
                
                // Explicitly install pip dependencies
                install "wheel"
                install "setuptools"
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
        cmake {
            path "../../CMakeLists.txt"
	    version "3.25.1"
        }
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets', '../../stock_monitoring_app']
            python {
                srcDir "../../stock_monitoring_app"
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    ndkVersion '26.1.10909125'
}
